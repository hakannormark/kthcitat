{% extends "wap/base.html" %}
{% block url %}/wap/sok{% endblock %}
{% block card_title %}SÖK CITAT{% endblock %}
{% block content %}
  <h1>Sök citat</h1>

  <form method="get" action="{{ url_for('wap_results') }}">
    <input type="hidden" name="search" value="form">

    <label>Persontyp</label>
    <select name="typ">
      <option value="1">Lärare/Personal</option>
      <option value="2">Teknolog</option>
    </select>

    <label>Institution</label>
    <select name="institution">
      <option value="-1">Alla</option>
      {% for inst in institutions %}
      <option value="{{ inst['ID'] }}">{{ inst['Namn'] }}</option>
      {% endfor %}
    </select>

    <label>Person</label>
    <select name="person">
      <option value="-1">Alla</option>
      {% for p in persons %}
      <option value="{{ p['ID'] }}">{{ p['Namn'] }}</option>
      {% endfor %}
    </select>

    <button type="submit">Visa citat</button>
  </form>

  <hr>

  <form method="get" action="{{ url_for('wap_results') }}">
    <input type="hidden" name="search" value="text">
    <label>Fritextsök</label>
    <input type="text" name="query" placeholder="Sök...">
    <button type="submit">Sök</button>
  </form>

  <a class="back-link" href="{{ url_for('wap_index') }}">← Tillbaka</a>
{% endblock %}
