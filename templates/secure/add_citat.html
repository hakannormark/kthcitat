<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<HTML>
<HEAD>
  <title>KTH-citat</title>
  <meta charset="utf-8">
</HEAD>
<body bgColor="#fffff1" MS_POSITIONING="GridLayout" style="min-height:750px; position:relative;">
  <img src="{{ url_for('static', filename='kth.gif') }}"
       style="Z-INDEX:107; LEFT:16px; POSITION:absolute; TOP:16px; height:126px; width:252px;">

  <span style="Z-INDEX:110; LEFT:297px; POSITION:absolute; TOP:50px; font-size:xx-large; font-family:Verdana; height:29px; width:353px;">KTH-Citat</span>

  <a href="{{ url_for('index') }}"
     style="Z-INDEX:109; LEFT:576px; POSITION:absolute; TOP:16px; font-size:x-small; font-family:Verdana; height:22px; width:70px; color:black; text-decoration:none;">Startsida</a>

  <span style="Z-INDEX:100; LEFT:29px; POSITION:absolute; TOP:162px; font-size:large; font-family:Verdana; height:29px; width:365px;">Lägg till ett nytt citat</span>

  <form method="post" id="citatForm">
    <!-- Person -->
    <span style="Z-INDEX:103; LEFT:53px; POSITION:absolute; TOP:228px; font-size:medium; font-family:Verdana; height:29px; width:88px;">Person:</span>
    <select name="person"
            style="Z-INDEX:104; LEFT:146px; POSITION:absolute; TOP:228px; font-family:Verdana; height:31px; width:188px;">
      {% for p in persons %}
      <option value="{{ p['ID'] }}">{{ p['Namn'] }}</option>
      {% endfor %}
    </select>
    <a href="{{ url_for('add_person') }}"
       style="Z-INDEX:108; LEFT:230px; POSITION:absolute; TOP:259px; font-size:xx-small; font-family:Verdana; height:22px; width:104px; color:black; text-decoration:none;">Lägg till ny person</a>

    <!-- Datum -->
    <span style="Z-INDEX:105; LEFT:53px; POSITION:absolute; TOP:285px; font-size:medium; font-family:Verdana; height:29px; width:88px;">Datum:</span>

    <input type="checkbox" name="unknown" id="unknownCb" value="on"
           style="Z-INDEX:111; LEFT:265px; POSITION:absolute; TOP:288px; width:69px; height:22px;"
           onchange="toggleDate(this)">
    <label for="unknownCb"
           style="LEFT:285px; POSITION:absolute; TOP:290px; font-family:Verdana; font-size:smaller; font-weight:bold;">Okänt</label>

    <span id="yearLabel" style="Z-INDEX:117; LEFT:176px; POSITION:absolute; TOP:320px; width:64px; height:24px; font-family:Verdana; font-size:x-small; font-weight:bold;">År:</span>
    <input type="text" name="year" id="yearInput" maxlength="4" value="{{ today.year }}"
           style="Z-INDEX:121; LEFT:240px; POSITION:absolute; TOP:320px; width:94px; height:25px; font-family:Verdana; font-size:x-small;">
    {% if year_error %}
    <span style="Z-INDEX:122; LEFT:344px; POSITION:absolute; TOP:328px; width:136px; height:29px; font-family:Verdana; font-size:x-small; color:red; font-style:italic;">Felaktigt år!</span>
    {% endif %}

    <span id="monthLabel" style="Z-INDEX:118; LEFT:176px; POSITION:absolute; TOP:352px; width:64px; height:24px; font-family:Verdana; font-size:x-small; font-weight:bold;">Månad:</span>
    <select name="month" id="monthSelect"
            style="Z-INDEX:115; LEFT:240px; POSITION:absolute; TOP:352px; width:95px; height:31px; font-family:Verdana;">
      {% for val, name in months %}
      <option value="{{ val }}" {% if val == today.month|string %}selected{% endif %}>{{ name }}</option>
      {% endfor %}
    </select>

    <span id="dayLabel" style="Z-INDEX:120; LEFT:176px; POSITION:absolute; TOP:384px; width:64px; height:24px; font-family:Verdana; font-size:x-small; font-weight:bold;">Dag:</span>
    <select name="day" id="daySelect"
            style="Z-INDEX:116; LEFT:239px; POSITION:absolute; TOP:384px; width:95px; height:31px; font-family:Verdana;">
      {% for val, label in days %}
      <option value="{{ val }}" {% if val == today.day|string %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>

    <!-- Citat -->
    <span style="Z-INDEX:102; LEFT:53px; POSITION:absolute; TOP:424px; font-size:medium; font-family:Verdana; height:29px; width:88px;">Citat:</span>
    <textarea name="citat" tabindex="3"
              style="Z-INDEX:101; LEFT:146px; POSITION:absolute; TOP:424px; font-size:x-small; font-family:Verdana; height:133px; width:188px;"></textarea>

    <!-- Notering -->
    <span style="Z-INDEX:112; LEFT:53px; POSITION:absolute; TOP:576px; font-size:medium; font-family:Verdana; height:29px; width:88px;">Notering:</span>
    <span style="Z-INDEX:114; LEFT:53px; POSITION:absolute; TOP:608px; font-family:Verdana; font-size:x-small; width:88px; height:29px;">(frivilligt)</span>
    <textarea name="note" tabindex="4"
              style="Z-INDEX:113; LEFT:146px; POSITION:absolute; TOP:576px; width:188px; height:58px; font-family:Verdana; font-size:x-small;"></textarea>

    <!-- Submit -->
    <button type="submit" tabindex="5"
            style="Z-INDEX:106; LEFT:146px; POSITION:absolute; TOP:656px; font-size:medium; font-family:Verdana; height:60px; width:188px;">Lägg till!</button>
  </form>

  <script>
  function toggleDate(cb) {
    var disabled = cb.checked;
    var color = disabled ? 'darkgray' : 'black';
    document.getElementById('yearInput').disabled = disabled;
    document.getElementById('monthSelect').disabled = disabled;
    document.getElementById('daySelect').disabled = disabled;
    document.getElementById('yearLabel').style.color = color;
    document.getElementById('monthLabel').style.color = color;
    document.getElementById('dayLabel').style.color = color;
  }
  </script>
</body>
</HTML>
